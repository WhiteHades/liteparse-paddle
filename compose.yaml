services:
  liteparse-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: liteparse-server
    ports:
      - "${LP_PORT:-5000}:5000"
    environment:
      PADDLE_OCR_URL: http://paddle-ocr:8829/ocr
    depends_on:
      paddle-ocr:
        condition: service_healthy
    restart: unless-stopped

  paddle-ocr:
    build:
      context: ./python
      dockerfile: Dockerfile
    container_name: paddle-ocr
    ports:
      - "8829:8829"
    # GPU acceleration (requires NVIDIA Container Toolkit + CUDA paddlepaddle):
    # 1. Change python/Dockerfile to use the CUDA index:
    #    --index-url https://www.paddlepaddle.org.cn/packages/stable/cuda12/
    # 2. Uncomment the deploy block below
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8829/health')"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 120s
    restart: unless-stopped
